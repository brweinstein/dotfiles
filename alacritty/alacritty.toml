[terminal.shell]
program = "wsl"
args = ["-d", "Arch", "--user", "bw", "--cd", "~", "tmux"]

[cursor]
style = "Beam"

[font]
size = 12.0
normal = { family = "JetBrainsMono NF" }

[window]
startup_mode = "Windowed"
dynamic_padding = true
opacity = 1

[window.padding]
x = 5
y = 5

[window.dimensions]
columns = 120
lines = 30

[general]
import = [
   "%APPDATA%/alacritty/themes/one_dark.toml"
]
