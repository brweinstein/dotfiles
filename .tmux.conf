# ─ Prefix ─────────────────────────
unbind C-b
set-option -g prefix M-a
bind-key M-a send-prefix
set-option -g default-shell /usr/bin/zsh
# ─ Split Panes ────────────────────
bind ] split-window -h -c "#{pane_current_path}"
bind [ split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
# ─ New Tab/Navigation ─────────────
bind t new-window -c "#{pane_current_path}"
bind -n M-S-Left  previous-window
bind -n M-S-Right next-window
bind w confirm-before -p "Kill pane? (y/n)" kill-pane
# ─ Pane Navigation (Alt + Arrows) ─
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
# ─ Resize Panes (Prefix + Arrows) ─
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5
# ─ Mouse Support ──────────────────
set -g mouse on
# ─ Copy Mode ──────────────────────
setw -g mode-keys vi
bind-key e copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"
# ─ Pane Number Overlay ────────────
set -g display-panes-time 1500
bind -n M-Left  select-pane -L \; display-panes
bind -n M-Right select-pane -R \; display-panes
bind -n M-Up    select-pane -U \; display-panes
bind -n M-Down  select-pane -D \; display-panes
# ─ Terminal & Focus ───────────────
set-option -g focus-events on
set-option -ga terminal-features "xterm-256color:RGB"
# ─ Status Bar ─────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 2
set -g status-justify centre
set -g status-style 'bg=#282828,fg=#ebdbb2'
# ─ Window Tabs ────────────────────
set-window-option -g window-status-style         'bg=#282828,fg=#928374'
set-window-option -g window-status-format        '  #I:#W  '
set-window-option -g window-status-current-style 'bg=#3c3836,fg=#83a598,bold'
set-window-option -g window-status-current-format '  #I:#W  '
set-window-option -g window-status-activity-style 'bg=#282828,fg=#fabd2f'
set-window-option -g window-status-bell-style     'bg=#282828,fg=#fb4934,bold'
# ─ Status Left ────────────────────
set -g status-left-length 100
set -g status-left '\
   #[fg=#83a598,bold]#S \
#[fg=#928374]│\
#[fg=#b8bb26] #(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "no-git") \
#[fg=#928374]│\
#[fg=#ebdbb2] #{b:pane_current_path} '
# ─ Status Right ───────────────────
set -g status-right-length 100
set -g status-right '\
#[fg=#928374]│\
#[fg=#fabd2f] #(uptime | sed "s/.*up //;s/,.*//;s/^ //") \
#[fg=#928374]│\
#[fg=#ebdbb2] %Y-%m-%d \
#[fg=#83a598,bold] %H:%M   '
# ─ Pane Borders ───────────────────
set-option -g pane-border-style        'fg=#504945'
set-option -g pane-active-border-style 'fg=#83a598'
# ─ Pane Number Display Style ──────
set -g display-panes-colour        '#928374'
set -g display-panes-active-colour '#fabd2f'
# ─ Message Styles ─────────────────
set-option -g message-style         'bg=#282828,fg=#ebdbb2'
set-option -g message-command-style 'bg=#282828,fg=#fabd2f'
# ─ Copy Mode Styling ──────────────
set -g mode-style 'bg=#3c3836,fg=#ebdbb2'
# ─ Clock Mode ─────────────────────
set -g clock-mode-colour '#83a598'
set -g clock-mode-style 24
# ─ Reload Config ──────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
