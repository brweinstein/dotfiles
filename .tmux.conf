# ─ Prefix ─────────────────────────
unbind C-b
set-option -g prefix M-a
bind-key M-a send-prefix
set-option -g default-shell /usr/bin/zsh

# ─ Split Panes ────────────────────
bind ] split-window -h -c "#{pane_current_path}"
bind [ split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ─ New Tab/Navigation ─────────────
bind t new-window -c "#{pane_current_path}"
bind -n M-S-Left  previous-window
bind -n M-S-Right next-window
bind w confirm-before -p "Kill pane? (y/n)" kill-pane

# ─ Pane Navigation (Alt + Arrows) ─
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ─ Resize Panes (Prefix + Arrows) ─
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5

# ─ Mouse Support ──────────────────
set -g mouse on

# ─ Copy Mode ──────────────────────
setw -g mode-keys vi
bind-key e copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

# ─ Pane Number Overlay ────────────
set -g display-panes-time 1500
bind -n M-Left  select-pane -L \; display-panes
bind -n M-Right select-pane -R \; display-panes
bind -n M-Up    select-pane -U \; display-panes
bind -n M-Down  select-pane -D \; display-panes

# ─ Terminal & Focus ───────────────
set-option -g focus-events on
set-option -ga terminal-features "xterm-256color:RGB"

# ─ Status Bar ─────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 2
set -g status-justify centre
set -g status-style 'bg=#303030,fg=#abb2bf'

# ─ Window Tabs ────────────────────
set-window-option -g window-status-style         'bg=#303030,fg=#5c6370'
set-window-option -g window-status-format        '  #I:#W  '
set-window-option -g window-status-current-style 'bg=#3a3f4b,fg=#61afef,bold'
set-window-option -g window-status-current-format '  #I:#W  '
set-window-option -g window-status-activity-style 'bg=#303030,fg=#e5c07b'
set-window-option -g window-status-bell-style     'bg=#303030,fg=#e06c75,bold'

# ─ Status Left ────────────────────
set -g status-left-length 100
set -g status-left '\
   #[fg=#61afef,bold]#S \
#[fg=#5c6370]│\
#[fg=#98c379] #(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "no-git") \
#[fg=#5c6370]│\
#[fg=#abb2bf] #{b:pane_current_path} '

# ─ Status Right ───────────────────
set -g status-right-length 100
set -g status-right '\
#[fg=#5c6370]│\
#[fg=#e5c07b] #(uptime | sed "s/.*up //;s/,.*//;s/^ //") \
#[fg=#5c6370]│\
#[fg=#abb2bf] %Y-%m-%d \
#[fg=#61afef,bold] %H:%M   '

# ─ Pane Borders ───────────────────
set-option -g pane-border-style        'fg=#4b5263'
set-option -g pane-active-border-style 'fg=#61afef'

# ─ Pane Number Display Style ──────
set -g display-panes-colour        '#5c6370'
set -g display-panes-active-colour '#e5c07b'

# ─ Message Styles ─────────────────
set-option -g message-style         'bg=#303030,fg=#abb2bf'
set-option -g message-command-style 'bg=#303030,fg=#e5c07b'

# ─ Copy Mode Styling ──────────────
set -g mode-style 'bg=#3e4452,fg=#abb2bf'

# ─ Clock Mode ─────────────────────
set -g clock-mode-colour '#61afef'
set -g clock-mode-style 24

# ─ Reload Config ──────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded! (One Dark Pro)"
